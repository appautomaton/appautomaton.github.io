<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>No such unit · App Automaton</title>
    <style>
      @font-face {
        font-family: 'Sirin Stencil';
        src: url('/fonts/SirinStencil-Regular.woff2') format('woff2');
        font-display: swap;
      }

      :root {
        --bg: #f3eee3;
        --border: #c9bea3;
        --accent: #3f6e60;
        --brass: #9c6b2e;
        --text: #3a3128;
        --muted: #7a6f5e;
        --grid: rgba(96, 74, 42, 0.055);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1c1510;
          --border: #4a3a28;
          --accent: #5b8a7c;
          --brass: #c08a3e;
          --text: #dfd6c6;
          --muted: #a5987f;
          --grid: rgba(214, 158, 84, 0.05);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background-color: var(--bg);
        background-image:
          linear-gradient(var(--grid) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid) 1px, transparent 1px);
        background-size: 32px 32px;
        font-family: 'Helvetica Neue', system-ui, sans-serif;
        color: var(--text);
      }

      .sheet {
        position: relative;
        max-width: 34rem;
        margin: 1.5rem;
        padding: 3.5rem 2.5rem 2.5rem;
        text-align: center;
      }

      .reg {
        position: absolute;
        width: 14px;
        height: 14px;
        border: 0 solid var(--brass);
        opacity: 0.55;
      }

      .tl { top: 0; left: 0; border-top-width: 1px; border-left-width: 1px; }
      .tr { top: 0; right: 0; border-top-width: 1px; border-right-width: 1px; }
      .bl { bottom: 0; left: 0; border-bottom-width: 1px; border-left-width: 1px; }
      .br { bottom: 0; right: 0; border-bottom-width: 1px; border-right-width: 1px; }

      .mark {
        display: block;
        margin: 0 auto 1.4rem;
      }

      .code {
        font-family: ui-monospace, Menlo, monospace;
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 0.8rem;
      }

      h1 {
        font-family: 'Sirin Stencil', 'Arial Narrow', sans-serif;
        font-weight: 400;
        font-size: clamp(2.4rem, 8vw, 3.6rem);
        line-height: 1.05;
        color: var(--accent);
        margin: 0 0 1rem;
      }

      p {
        margin: 0 0 1.8rem;
        font-size: 0.98rem;
        line-height: 1.55;
      }

      a {
        font-family: ui-monospace, Menlo, monospace;
        font-size: 0.85rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--brass);
      }
    </style>
  </head>
  <body>
    <main class="sheet">
      <span class="reg tl"></span>
      <span class="reg tr"></span>
      <span class="reg bl"></span>
      <span class="reg br"></span>
      <svg class="mark" viewBox="0 0 32 32" width="56" height="56" aria-hidden="true">
        <defs>
          <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#6ba6ff" />
            <stop offset="1" stop-color="#9d7cff" />
          </linearGradient>
        </defs>
        <rect width="32" height="32" rx="7" fill="#0a0b0f" />
        <rect x="8" y="8" width="16" height="16" rx="2.5" fill="none" stroke="#e8ebf4" stroke-width="1.8" stroke-linejoin="round" />
        <circle cx="16" cy="16" r="3.6" fill="url(#core)" />
      </svg>
      <p class="code">Error 404 · Sheet not on file</p>
      <h1>No such unit</h1>
      <p>The catalog holds no drawing at this address. It may have moved to its own workshop, or it never existed.</p>
      <a href="/">← Return to the catalog</a>
    </main>
  </body>
</html>
