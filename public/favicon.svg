<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    .plate { fill: #1e241e; }
    .frame { stroke: #f2f3ea; }
    .core { fill: #4e7d6c; }
    @media (prefers-color-scheme: dark) {
      .plate { fill: #dce4d4; }
      .frame { stroke: #0e1310; }
      .core { fill: #47705f; }
    }
  </style>
  <rect class="plate" width="32" height="32" rx="7"/>
  <rect class="frame" x="8" y="8" width="16" height="16" rx="2.5" fill="none" stroke-width="1.8" stroke-linejoin="round"/>
  <circle class="core" cx="16" cy="16" r="3.6"/>
</svg>
