<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>No such unit · App Automaton</title>
    <style>
      @font-face {
        font-family: 'League Gothic';
        src: url('/fonts/LeagueGothic-var.subset.woff2') format('woff2');
        font-weight: 400;
        font-stretch: 75% 100%;
        font-display: swap;
      }

      :root {
        --bg: #e9eae1;
        --border: #cdd0c0;
        --accent: #2a5847;
        --patina: #4e7d6c;
        --text: #1e241e;
        --muted: #5f6a5d;
        --duck-filter: grayscale(1) sepia(0.3) hue-rotate(68deg) saturate(0.45) contrast(1.03);
        --duck-blend: multiply;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e1310;
          --border: #28312a;
          --accent: #5fa284;
          --patina: #7fa98f;
          --text: #dce4d4;
          --muted: #8a9787;
          --duck-filter: grayscale(1) invert(0.92) sepia(0.45) hue-rotate(75deg) saturate(0.8)
            brightness(0.82) contrast(1.08);
          --duck-blend: screen;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background-color: var(--bg);
        font-family: Georgia, 'Times New Roman', serif;
        color: var(--text);
      }

      .sheet {
        max-width: 30rem;
        margin: 1.5rem;
        padding: 2.5rem 2.2rem 2.2rem;
        text-align: center;
        border: 1px solid var(--text);
        outline: 1px solid var(--border);
        outline-offset: 4px;
      }

      .duck {
        width: min(46vw, 170px);
        height: auto;
        margin: 0 auto 1.2rem;
        display: block;
        filter: var(--duck-filter);
        mix-blend-mode: var(--duck-blend);
      }

      .code {
        font-family: ui-monospace, Menlo, monospace;
        font-size: 0.68rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--patina);
        margin: 0 0 0.7rem;
      }

      h1 {
        font-family: 'League Gothic', 'Arial Narrow', sans-serif;
        font-weight: 400;
        font-size: clamp(3rem, 10vw, 4.4rem);
        line-height: 0.95;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        margin: 0 0 0.9rem;
      }

      p {
        margin: 0 0 1.6rem;
        font-size: 0.98rem;
        line-height: 1.55;
        color: var(--muted);
      }

      a {
        font-family: ui-monospace, Menlo, monospace;
        font-size: 0.78rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="sheet">
      <svg viewBox="0 0 32 32" width="40" height="40" aria-hidden="true" style="display:block;margin:0 auto 1rem">
        <rect width="32" height="32" rx="7" fill="var(--text)"/>
        <rect x="8" y="8" width="16" height="16" rx="2.5" fill="none" stroke="var(--bg)" stroke-width="1.8" stroke-linejoin="round"/>
        <circle cx="16" cy="16" r="3.6" fill="var(--patina)"/>
      </svg>
      <img class="duck" src="/duck.webp" width="800" height="1062" alt="" />
      <p class="code">Error 404 · Not on the program</p>
      <h1>No such unit</h1>
      <p>The catalog holds no exhibit at this address. It may have moved to its own workshop, or it never existed.</p>
      <a href="/">← Return to the theater</a>
    </main>
  </body>
</html>
